<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style (2).css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
       
    </style>
</head>

<body>
    <div class="style style1"><img src="img/cash.png" alt=""></div>
    <div class="style style2"><img src="img/light.png" alt=""></div>
    <div class="style style3"><img src="img/jail.png" alt=""></div>
    <div class="style style4"><img src="img/treasure.png" alt=""></div>

    <header>
        <div class="all-players-default">
            <h1>Active Players</h1>
            <hr>
            <div class="player-grid"></div>
        </div>
        <div class="monopoly-logo">
            <img src="img/Monopoly__products_at_Zazzle-removebg-preview.png" alt="">
            <h1>MONOPOLY</h1>
        </div>
        <div class="stock-gestion-default">
            <button class="stock-button">SEE STOCK</button>
        </div>
    </header>

    <!-- ══ Setup section ══ -->
    <section class="begining-section">
        <div class="begining-card">
            <h1>Create a new game</h1>
            <div class="select-part">
                <select id="selectOption">
                    <option value="2">2 players</option>
                    <option value="3">3 players</option>
                    <option value="4">4 players</option>
                    <option value="5">5 players</option>
                </select>
                <div class="select-icon">
                    <i class="fa-solid fa-circle-down fa-xl"></i>
                </div>
            </div>
            <button id="begining-button">Next</button>
        </div>

        <form class="player-info-defaulthide">
            <h1>Enter player names</h1>
            <div class="player-inputs"></div>
            <button id="player-info-button">Start Game</button>
        </form>

        <div class="load-animation-default">
            <h1>Setting up the board…</h1>
            <div class="img-container">
                <img src="img/360_F_417419275_y8vQY8TXGRpQGpsgkkqihUaWpmtukRhY-removebg-preview.png" alt="">
            </div>
        </div>
    </section>

    <!-- ══ Game section ══ -->
    <section class="game-section" style="display:none;">
        <div id="game-card">
            <!-- CENTER — board squares injected dynamically by BoardUI.js -->
            <div id="center">
                <div id="center-icon">🎩</div>
                <div id="center-logo">MONOPOLY</div>
            </div>
        </div>
    </section>

    <!-- ══ Stock panel ══ -->
    <div class="stock-app-default">
        <h1>STOCK MANAGEMENT</h1>
        <h3>OWNER : <span></span></h3>
        <hr>
        <div class="stock-summary">
            <div class="stock-money">
                <h3>Balance :</h3>
                <h3>£0</h3>
            </div>
            <div class="stock-expenses">
                <h3>Properties :</h3>
                <h3>£0</h3>
            </div>
        </div>
        <div class="stock-information">
            <h3>Properties owned</h3>
        </div>
        <div class="exit-stock">
            <i class="fa-solid fa-x"></i>
        </div>
    </div>

    <!-- ══ Dice panel ══ -->
    <div class="roll-dice-default">
        <button class="roll-button">Roll Dice <i class="fa-solid fa-dice fa-xl"></i></button>
        <h3>Die 1 : <span class="dice-number"></span>
            <span class="dice-face"><i id="dice-icon" class=""></i></span></h3>
        <h3>Die 2 : <span class="dice-number2"></span>
            <span class="dice-face"><i id="dice-icon2" class=""></i></span></h3>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
